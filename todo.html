<html>
    <body>
            <button onclick="Addtask()">Add Task</button>
        <button onclick="RemoveTask()">Remove Task</button>
        <input type="text" class="taskinput">
    <ul class="todolist">

    </ul>

    <script>
        function Addtask(){
            const element=document.querySelector(".todolist");
            const childwrapper=document.createElement("div");
            const checkbox=document.createElement("input");
            checkbox.type="checkbox";
            const button=document.createElement("button");
            button.textContent="X"
            button.onclick=RemoveTask;
            const text=document.querySelector(".taskinput").value;
            childwrapper.append(checkbox);
            childwrapper.append(text);
            childwrapper.append(button);
            element.append(childwrapper);
            
        }
        function RemoveTask(){
            event.target.parentElement.remove()
        }
    </script>
</body>
</html>

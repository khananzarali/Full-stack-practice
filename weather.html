<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Widget</title>
</head>
<body>
  
  <div class="weatherwidget">Loading......</div>
  
  <script>
    async function fetchWeather() {
      const parentwrapper = document.querySelector(".weatherwidget");
      
      try {
        // Fix 1: We need to save the result of the fetch to a variable named 'response'
        const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=32.7266&longitude=74.8570&current_weather=true");
        
        // Fix 2: 'response' is an object, not a function. '.json()' is the method. 
        // We also need to save this parsed data to a variable named 'data'
        const data = await response.json();
        
        // Fix 3: Dig into the JSON data to get the specific weather details
        const currentTemp = data.current_weather.temperature;
        const windSpeed = data.current_weather.windspeed;
        
        // Fix 4: Inject the data into your HTML element
        parentwrapper.innerHTML = `
          <h3>Jammu Weather</h3>
          <p><strong>Temperature:</strong> ${currentTemp}°C</p>
          <p><strong>Wind:</strong> ${windSpeed} km/h</p>
        `;
        
      } catch (error) {
        // It's always good practice to handle errors just in case the API goes down
        parentwrapper.innerHTML = "Error loading weather data.";
        console.error(error);
      }
    }

    // Fix 5: You defined the function, but you have to call it so it actually runs!
    fetchWeather();
  </script>
</body>
</html>
